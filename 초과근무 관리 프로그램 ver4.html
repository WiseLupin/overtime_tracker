<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사 초과근무 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="py-6 px-4">
    <div class="max-w-xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">초과근무 관리 시스템</h1>
            <p class="text-slate-400 mt-2 text-sm font-medium uppercase tracking-widest">Smart Overtime Management</p>
        </header>

        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4 mb-6 flex justify-between items-center">
            <span class="text-sm font-semibold text-slate-500">기준 월</span>
            <input type="month" id="monthFilter" onchange="render()" class="font-bold text-slate-800 outline-none bg-transparent">
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-6">
            <div class="flex flex-col sm:flex-row gap-3 mb-4">
                <div class="flex-1">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">날짜</label>
                    <input type="date" id="dateInput" class="w-full bg-slate-50 border border-slate-100 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex-1">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">퇴근 시간</label>
                    <input type="time" id="timeInput" class="w-full bg-slate-50 border border-slate-100 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            
            <div class="flex gap-4 mb-5">
                <label class="flex items-center text-xs font-medium text-slate-600 cursor-pointer">
                    <input type="checkbox" id="isWeekend" class="w-4 h-4 rounded border-slate-300 mr-2"> 주말
                </label>
                <label class="flex items-center text-xs font-medium text-slate-600 cursor-pointer">
                    <input type="checkbox" id="isSupplementary" class="w-4 h-4 rounded border-slate-300 mr-2"> 보충(100분)
                </label>
            </div>

            <button onclick="addRecord()" class="w-full bg-[#1e3a8a] text-white font-bold py-3 rounded-xl hover:bg-[#172554] transition active:scale-[0.98]">
                기록 추가
            </button>
        </div>

        <div class="bg-gradient-to-br from-[#4f46e5] to-[#6366f1] rounded-2xl p-6 text-white mb-6 shadow-xl shadow-indigo-200">
            <h2 class="text-indigo-100 text-xs font-medium mb-1" id="currentMonthLabel">이번 달 누적 초과근무</h2>
            <div id="totalDisplay" class="text-3xl font-bold">0시간 0분</div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-5 py-4 border-b border-slate-50 flex justify-between items-center">
                <h3 class="font-bold text-slate-700">기록 리스트</h3>
                <button onclick="resetMonth()" class="text-[10px] text-red-400 hover:text-red-600 uppercase font-bold">월 초기화</button>
            </div>
            <div id="recordTable" class="divide-y divide-slate-50"></div>
        </div>
        <button onclick="undoDelete()" id="undoBtn" class="mt-4 w-full text-center text-xs text-slate-400 hover:text-blue-700 hidden">삭제 복원하기</button>
        
        <footer class="mt-8 text-center">
            <p class="text-[10px] text-slate-300 uppercase tracking-widest">Made by Minsoo Kim</p>
        </footer>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('overtime_records')) || [];
        let deletedRecords = [];

        function init() {
            const today = new Date();
            document.getElementById('dateInput').valueAsDate = today;
            document.getElementById('timeInput').value = today.toTimeString().slice(0, 5);
            document.getElementById('monthFilter').value = today.toISOString().slice(0, 7);
            render();
        }

        function calculateTime(timeStr, isWeekend, isSupplementary) {
            const [h, m] = timeStr.split(':').map(Number);
            const totalMinutes = h * 60 + m;
            const endWork = 16 * 60 + 30;
            if (totalMinutes <= endWork) return 0;
            let workMinutes = totalMinutes - endWork;
            if (!isWeekend) workMinutes -= 60;
            if (isSupplementary) workMinutes -= 100;
            return Math.min(Math.max(0, workMinutes), 240);
        }

        function addRecord() {
            const date = document.getElementById('dateInput').value;
            const time = document.getElementById('timeInput').value;
            const isWeekend = document.getElementById('isWeekend').checked;
            const isSupplementary = document.getElementById('isSupplementary').checked;
            records.push({ date, time, minutes: calculateTime(time, isWeekend, isSupplementary), isWeekend, isSupplementary });
            document.getElementById('monthFilter').value = date.slice(0, 7);
            save(); render();
        }

        function save() { localStorage.setItem('overtime_records', JSON.stringify(records)); }

        function deleteRecord(index) {
            const month = document.getElementById('monthFilter').value;
            const filtered = records.map((r, i) => r.date.startsWith(month) ? i : -1).filter(i => i !== -1);
            deletedRecords = [records[filtered[index]]];
            records.splice(filtered[index], 1);
            save(); render();
        }

        function undoDelete() { if (deletedRecords.length > 0) { records.push(deletedRecords[0]); deletedRecords = []; save(); render(); } }

        function resetMonth() {
            const month = document.getElementById('monthFilter').value;
            if(confirm(`${month}월 기록을 모두 삭제할까요?`)) { records = records.filter(r => !r.date.startsWith(month)); save(); render(); }
        }

        function render() {
            const container = document.getElementById('recordTable');
            const month = document.getElementById('monthFilter').value;
            container.innerHTML = '';
            const filtered = records.filter(r => r.date.startsWith(month));
            let total = 0;
            document.getElementById('currentMonthLabel').innerText = `${month} 누적 초과근무`;
            filtered.forEach((r, i) => {
                total += r.minutes;
                container.innerHTML += `<div class="px-5 py-4 flex justify-between items-center text-sm">
                    <div><span class="font-bold text-slate-700">${r.date.slice(5)}</span> <span class="text-slate-400">(${r.time})</span></div>
                    <div class="flex items-center gap-3"><span class="font-bold text-indigo-700">${Math.floor(r.minutes/60)}h ${r.minutes%60}m</span><button onclick="deleteRecord(${i})" class="text-slate-200 hover:text-red-400">✕</button></div>
                </div>`;
            });
            document.getElementById('totalDisplay').innerText = `${Math.floor(total/60)}시간 ${total%60}분`;
            document.getElementById('undoBtn').classList.toggle('hidden', deletedRecords.length === 0);
        }
        init();
    </script>
</body>
</html>
