<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초과근무 관리시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        input[type="date"], input[type="time"], input[type="month"], input[type="number"] {
            width: 100%; height: 44px; padding: 0 12px; font-size: 16px; box-sizing: border-box;
            appearance: none; -webkit-appearance: none; border-radius: 0.5rem; border: 1px solid #e2e8f0; background-color: #f8fafc;
        }
        .toggle-checkbox:checked { right: 0; border-color: #1e3a8a; }
        .toggle-checkbox:checked + .toggle-label { background-color: #1e3a8a; }
    </style>
</head>
<body class="py-6 px-4">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div></div>
            <div class="text-center">
                <h1 class="text-xl font-bold text-slate-800">초과근무 관리시스템</h1>
                <p class="text-[10px] text-slate-400 font-bold tracking-[0.2em] uppercase">TEACHER OVERTIME MANAGEMENT</p>
            </div>
            <button onclick="toggleSettings()" class="text-slate-600 text-xl">⚙️</button>
        </div>

        <div id="settingsSection" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-5 mb-6 space-y-4">
            <h2 class="font-bold text-sm text-slate-700">근무 환경 설정</h2>
            <div class="grid grid-cols-2 gap-2">
                <div><label class="text-[10px] text-slate-400">출근 시간</label><input type="time" id="setStart" value="08:30"></div>
                <div><label class="text-[10px] text-slate-400">퇴근 시간</label><input type="time" id="setEnd" value="16:30"></div>
            </div>
            <div><label class="text-[10px] text-slate-400">방과후 공제(분)</label><input type="number" id="setSupp" value="100"></div>
            <button onclick="saveSettings()" class="w-full bg-slate-800 text-white py-2 rounded-lg text-sm font-bold">저장하기</button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 mb-6">
            <label class="block text-xs font-bold text-slate-500 mb-2">기준 월 설정</label>
            <div class="flex gap-2">
                <input type="month" id="monthFilter" class="flex-1">
                <button onclick="render()" class="bg-slate-200 text-slate-700 px-4 rounded-lg font-bold text-sm">적용</button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 mb-6 space-y-6">
            <div class="flex justify-between items-center mb-2">
                <label class="text-xs font-bold text-slate-500">날짜 선택</label>
                <button onclick="fullResetInput()" class="text-[10px] bg-slate-200 px-2 py-1 rounded font-bold">초기화</button>
            </div>
            <input type="date" id="dateInput">
            
            <div class="space-y-4">
                <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <label class="text-sm font-bold text-slate-700">아침 근무</label>
                    <div class="relative inline-block w-12 align-middle select-none transition duration-200">
                        <input type="checkbox" id="morningToggle" onchange="toggleSection('morning')" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer"/>
                        <label for="morningToggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 cursor-pointer"></label>
                    </div>
                </div>
                <div id="morningSection" class="hidden space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">출근 시간</label><input type="time" id="morningTime"></div>
                
                <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <label class="text-sm font-bold text-slate-700">주말 근무</label>
                    <div class="relative inline-block w-12 align-middle select-none transition duration-200">
                        <input type="checkbox" id="weekendToggle" onchange="toggleSection('weekend')" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer"/>
                        <label for="weekendToggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 cursor-pointer"></label>
                    </div>
                </div>
                <div id="weekendSection" class="hidden grid grid-cols-2 gap-2">
                    <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">출근 시간</label><input type="time" id="weekendStart"></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">퇴근 시간</label><input type="time" id="weekendEnd"></div>
                </div>
            </div>

            <div class="space-y-4">
                <label class="flex items-center p-3 bg-slate-50 rounded-xl border border-slate-100"><input type="checkbox" id="isSupplementary" class="w-5 h-5 accent-blue-800 mr-3"> <span class="text-sm font-bold text-slate-700">방과후 수업</span></label>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2">퇴근 시간</label>
                    <input type="time" id="timeInput">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="addRecord()" class="bg-[#1e3a8a] text-white font-bold py-4 rounded-xl hover:bg-[#172554] transition shadow-md">기록 추가</button>
                <button onclick="applyCurrentTime()" class="bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-900 transition">현재시간 반영</button>
            </div>
        </div>

        <div class="bg-indigo-700 rounded-2xl p-6 text-white mb-6 shadow-lg shadow-indigo-200">
            <h2 class="text-indigo-200 text-xs font-medium mb-1">이번 달 누적 초과근무</h2>
            <div id="totalDisplay" class="text-3xl font-bold">0시간 0분</div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-bold text-slate-700">기록 리스트</h3>
                <button onclick="resetMonth()" class="text-xs text-red-400 hover:text-red-600 font-bold">월 초기화</button>
            </div>
            <div id="recordTable" class="divide-y divide-slate-100"></div>
        </div>
        <footer class="mt-8 text-center pb-6"><p class="text-[10px] text-slate-400">© 2026 Minsoo Kim. All rights reserved.</p></footer>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('overtime_records')) || [];
        let config = JSON.parse(localStorage.getItem('work_config')) || { start: "08:30", end: "16:30", supp: 100 };
        function init() {
            document.getElementById('monthFilter').value = new Date().toISOString().slice(0, 7);
            document.getElementById('setStart').value = config.start;
            document.getElementById('setEnd').value = config.end;
            document.getElementById('setSupp').value = config.supp;
            render();
        }
        function fullResetInput() {
            document.getElementById('dateInput').value = "";
            document.getElementById('timeInput').value = "";
            document.getElementById('morningToggle').checked = false; document.getElementById('morningSection').classList.add('hidden');
            document.getElementById('weekendToggle').checked = false; document.getElementById('weekendSection').classList.add('hidden');
            document.getElementById('isSupplementary').checked = false;
        }
        function applyCurrentTime() {
            const now = new Date();
            document.getElementById('dateInput').valueAsDate = now;
            document.getElementById('timeInput').value = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }
        function toggleSettings() { document.getElementById('settingsSection').classList.toggle('hidden'); }
        function saveSettings() {
            config = { start: document.getElementById('setStart').value, end: document.getElementById('setEnd').value, supp: parseInt(document.getElementById('setSupp').value) };
            localStorage.setItem('work_config', JSON.stringify(config));
            toggleSettings(); render();
        }
        function toggleSection(id) { document.getElementById(id + 'Section').classList.toggle('hidden', !document.getElementById(id + 'Toggle').checked); }
        function addRecord() {
            records.push({
                id: Date.now(),
                date: document.getElementById('dateInput').value,
                eveningTime: document.getElementById('timeInput').value,
                isSupplementary: document.getElementById('isSupplementary').checked,
                mUsed: document.getElementById('morningToggle').checked,
                mTime: document.getElementById('morningTime').value,
                wUsed: document.getElementById('weekendToggle').checked,
                wStart: document.getElementById('weekendStart').value,
                wEnd: document.getElementById('weekendEnd').value
            });
            save(); render();
        }
        function deleteRecord(id) { records = records.filter(r => r.id !== id); save(); render(); }
        function getDetail(r) {
            let mMin = 0, eMin = 0, wMin = 0, total = 0;
            if(r.wUsed) {
                const s = r.wStart.split(':').map(Number); const e = r.wEnd.split(':').map(Number);
                wMin = (e[0]*60 + e[1]) - (s[0]*60 + s[1]);
                let suppDeduction = r.isSupplementary ? config.supp : 0;
                total = Math.max(0, wMin - suppDeduction);
            } else {
                if (r.mUsed) {
                    const m = r.mTime.split(':').map(Number);
                    const lMins = config.start.split(':').map(Number)[0]*60 + config.start.split(':').map(Number)[1];
                    if (m[0]*60 + m[1] < lMins) mMin = (lMins - (m[0]*60 + m[1]));
                }
                const e = r.eveningTime.split(':').map(Number);
                const eTotal = e[0]*60 + e[1];
                const eMins = config.end.split(':').map(Number)[0]*60 + config.end.split(':').map(Number)[1];
                if (eTotal > eMins) eMin = eTotal - eMins;
                total = mMin + Math.max(0, eMin - 60 - (r.isSupplementary ? config.supp : 0));
            }
            return { mMin, eMin, wMin, total: Math.min(total, 240) };
        }
        function save() { localStorage.setItem('overtime_records', JSON.stringify(records)); }
        function render() {
            const container = document.getElementById('recordTable');
            const month = document.getElementById('monthFilter').value;
            container.innerHTML = ''; let totalMonthM = 0;
            records.filter(r => r.date.startsWith(month)).sort((a,b) => a.date.localeCompare(b.date)).forEach((r) => {
                const d = getDetail(r); totalMonthM += d.total;
                const formula = r.wUsed ? `주말(${d.wMin}분) - {보충수업 ${r.isSupplementary ? config.supp : 0}분}` : `아침(${d.mMin}분) + 저녁(${d.eMin}분) - {기본공제 60분 + 보충수업 ${r.isSupplementary ? config.supp : 0}분}`;
                container.innerHTML += `<div class="p-4 border-b border-slate-100">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold text-slate-700">${r.date.slice(5)}</span>
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-indigo-700">${Math.floor(d.total/60)}h ${d.total%60}m</span>
                            <button onclick="deleteRecord(${r.id})" class="text-[10px] bg-red-100 text-red-600 px-2 py-1 rounded">삭제</button>
                        </div>
                    </div>
                    <p class="text-[10px] text-slate-400 bg-slate-50 p-2 rounded truncate">${formula}</p>
                </div>`;
            });
            document.getElementById('totalDisplay').innerText = `${Math.floor(totalMonthM/60)}시간 ${totalMonthM%60}분`;
        }
        function resetMonth() { if(confirm("선택한 달의 기록을 초기화할까요?")) { records = records.filter(r => !r.date.startsWith(document.getElementById('monthFilter').value)); save(); render(); } }
        init();
    </script>
</body>
</html>
