<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사 초과근무 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        /* 입력창은 작게 유지 */
        input[type="date"], input[type="time"], input[type="number"] { height: 32px; padding: 0 8px; }
    </style>
</head>
<body class="py-6 px-4">
    <div class="max-w-xl mx-auto">
        <header class="mb-6 text-center flex justify-between items-end">
            <div class="text-left">
                <h1 class="text-2xl font-bold text-slate-800">초과근무 관리 시스템</h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Smart Management</p>
            </div>
            <button onclick="toggleSettings()" class="text-slate-400 hover:text-slate-600 font-bold text-sm">⚙️ 설정</button>
        </header>

        <!-- 설정 패널 -->
        <div id="settingsPanel" class="hidden bg-white p-4 rounded-xl border border-blue-100 mb-6 shadow-sm">
            <h3 class="font-bold text-sm mb-3">근무 환경 설정</h3>
            <div class="grid grid-cols-2 gap-2 text-xs mb-3">
                <div>출근시간: <input type="time" id="setStartTime" class="w-full border rounded"></div>
                <div>퇴근시간: <input type="time" id="setEndTime" class="w-full border rounded"></div>
            </div>
            <div class="text-xs">보충수업 공제(분): <input type="number" id="setSuppMin" class="w-20 border rounded px-2"></div>
            <button onclick="saveSettings()" class="mt-3 w-full bg-slate-800 text-white py-2 rounded-lg text-xs font-bold">설정 저장하기</button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-3 mb-4 flex justify-between items-center">
            <span class="text-sm font-semibold text-slate-500">기준 월</span>
            <input type="month" id="monthFilter" onchange="render()" class="font-bold text-slate-800 outline-none bg-transparent">
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4">
            <!-- 아침근무 별도 스타일 영역 -->
            <div class="mb-4 bg-slate-50 p-3 rounded-xl border border-slate-100">
                <label class="flex items-center cursor-pointer mb-2">
                    <input type="checkbox" id="isMorning" onchange="toggleMorning()" class="w-5 h-5 accent-indigo-600 rounded border-slate-300 mr-3">
                    <span class="text-sm font-bold text-slate-800 uppercase tracking-wide">아침근무 사용</span>
                </label>
                <div id="morningTimeContainer" class="hidden">
                    <input type="time" id="morningTimeInput" class="w-full bg-white border border-slate-200 rounded-lg">
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">날짜</label>
                    <input type="date" id="dateInput" class="w-full bg-slate-50 border border-slate-100 rounded-lg">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">퇴근 시간</label>
                    <input type="time" id="timeInput" class="w-full bg-slate-50 border border-slate-100 rounded-lg">
                </div>
            </div>
            
            <div class="flex gap-4 mb-4 text-sm font-medium text-slate-600">
                <label class="flex items-center"><input type="checkbox" id="isWeekend" class="mr-1"> 주말근무</label>
                <label class="flex items-center"><input type="checkbox" id="isSupplementary" class="mr-1"> 보충수업</label>
            </div>

            <button onclick="addRecord()" class="w-full bg-[#1e3a8a] text-white font-bold py-3 rounded-xl hover:bg-[#172554] transition active:scale-[0.98]">기록 추가</button>
        </div>

        <div class="bg-gradient-to-br from-[#4f46e5] to-[#6366f1] rounded-2xl p-6 text-white mb-6 shadow-xl shadow-indigo-100">
            <h2 class="text-indigo-100 text-xs font-medium mb-1">이번 달 누적 초과근무</h2>
            <div id="totalDisplay" class="text-3xl font-bold">0시간 0분</div>
        </div>

        <div id="recordTable" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden divide-y divide-slate-50"></div>
        <button onclick="undoDelete()" id="undoBtn" class="mt-4 w-full text-center text-xs text-slate-400 hover:text-blue-700 hidden">삭제 복원하기</button>

        <footer class="mt-8 text-center text-[10px] text-slate-300 uppercase tracking-widest">Made by Minsoo Kim</footer>
    </div>

    <script>
        let settings = JSON.parse(localStorage.getItem('settings')) || { start: '08:30', end: '16:30', supp: 100 };
        let records = JSON.parse(localStorage.getItem('overtime_records')) || [];
        let deletedRecords = [];

        function init() {
            document.getElementById('dateInput').valueAsDate = new Date();
            document.getElementById('timeInput').value = new Date().toTimeString().slice(0, 5);
            document.getElementById('monthFilter').value = new Date().toISOString().slice(0, 7);
            document.getElementById('setStartTime').value = settings.start;
            document.getElementById('setEndTime').value = settings.end;
            document.getElementById('setSuppMin').value = settings.supp;
            render();
        }

        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }
        function toggleMorning() { document.getElementById('morningTimeContainer').classList.toggle('hidden', !document.getElementById('isMorning').checked); }

        function saveSettings() {
            settings = { start: document.getElementById('setStartTime').value, end: document.getElementById('setEndTime').value, supp: parseInt(document.getElementById('setSuppMin').value) };
            localStorage.setItem('settings', JSON.stringify(settings));
            toggleSettings();
            render();
        }

        function calculateTime(eveningTime, morningTime, isWeekend, isSupplementary, isMorning) {
            const startBase = settings.start.split(':').map(Number);
            const endBase = settings.end.split(':').map(Number);
            const startBaseMin = startBase[0] * 60 + startBase[1];
            const endBaseMin = endBase[0] * 60 + endBase[1];

            let morningMins = 0;
            if (isMorning) {
                const [h, m] = morningTime.split(':').map(Number);
                const morningStartMin = h * 60 + m;
                morningMins = Math.max(0, startBaseMin - morningStartMin);
            }

            let eveningMins = 0;
            const [he, me] = eveningTime.split(':').map(Number);
            const eveningEndMin = he * 60 + me;
            eveningMins = Math.max(0, eveningEndMin - endBaseMin);

            let basicDed = !isWeekend ? 60 : 0;
            let suppDed = isSupplementary ? settings.supp : 0;

            let total = Math.max(0, morningMins + eveningMins - basicDed - suppDed);
            return { minutes: Math.min(total, 240), morningMins, eveningMins, basicDed, suppDed };
        }

        function addRecord() {
            const date = document.getElementById('dateInput').value;
            const time = document.getElementById('timeInput').value;
            const morningTime = document.getElementById('morningTimeInput').value;
            const isWeekend = document.getElementById('isWeekend').checked;
            const isSupplementary = document.getElementById('isSupplementary').checked;
            const isMorning = document.getElementById('isMorning').checked;
            
            const calc = calculateTime(time, morningTime, isWeekend, isSupplementary, isMorning);
            records.push({ date, time, morningTime, ...calc, isWeekend, isSupplementary, isMorning });
            save(); render();
        }

        function save() { localStorage.setItem('overtime_records', JSON.stringify(records)); }
        function deleteRecord(index) {
            const month = document.getElementById('monthFilter').value;
            const filtered = records.map((r, i) => r.date.startsWith(month) ? i : -1).filter(i => i !== -1);
            deletedRecords = [records[filtered[index]]];
            records.splice(filtered[index], 1);
            save(); render();
        }
        function undoDelete() { if (deletedRecords.length > 0) { records.push(deletedRecords[0]); deletedRecords = []; save(); render(); } }
        
        function toggleDetail(id) { document.getElementById(`detail-${id}`).classList.toggle('hidden'); }

        function render() {
            const container = document.getElementById('recordTable');
            const month = document.getElementById('monthFilter').value;
            container.innerHTML = '';
            let total = 0;
            records.filter(r => r.date.startsWith(month)).forEach((r, i) => {
                total += r.minutes;
                container.innerHTML += `<div class="cursor-pointer" onclick="toggleDetail(${i})">
                    <div class="px-5 py-4 flex justify-between items-center text-sm">
                        <div><span class="font-bold text-slate-700">${r.date.slice(5)}</span></div>
                        <div class="font-bold text-indigo-700">${Math.floor(r.minutes/60)}시간 ${r.minutes%60}분</div>
                        <button onclick="event.stopPropagation(); deleteRecord(${i})" class="text-slate-300 hover:text-red-500">✕</button>
                    </div>
                    <div id="detail-${i}" class="hidden px-5 pb-3 pt-0 text-[11px] text-slate-400 bg-slate-50">
                        상세: 아침(${r.morningMins}분) + 저녁(${r.eveningMins}분) - [기본공제 ${r.basicDed}분 / 보충공제 ${r.suppDed}분] = <b>인정 ${r.minutes}분</b>
                    </div>
                </div>`;
            });
            document.getElementById('totalDisplay').innerText = `${Math.floor(total/60)}시간 ${total%60}분`;
            document.getElementById('undoBtn').classList.toggle('hidden', deletedRecords.length === 0);
        }
        init();
    </script>
</body>
</html>
